services:
  postgres:
    image:  pgvector/pgvector:0.8.2-pg16-trixie
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_teaching_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]  # bật AOF để lưu bền
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - backend

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      MINIO_SERVER_URL: http://localhost:9000
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
      MINIO_KMS_SECRET_KEY: minio-default-key:ujWdfWgGBWHFDY7cekhUZ+qArDs8q/8YD8bgmNe8edA=
      MINIO_KMS_AUTO_ENCRYPTION: "on"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  minio_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local