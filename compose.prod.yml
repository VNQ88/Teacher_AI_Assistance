services:
  app:
    image: ${APP_IMAGE}
    container_name: teacher-assistant-ai
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9100
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - backend

  postgres:
    image: pgvector/pgvector:0.8.2-pg16-trixie
    container_name: teacher-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./src/main/resources/db/current-sql.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: teacher-assistant-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  minio:
    image: minio/minio:${MINIO_TAG}
    container_name: teacher-assistant-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY}
      MINIO_KMS_AUTO_ENCRYPTION: "on"
    command: server /data --address ":9100" --console-address ":9101"
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9100:9100"
      - "127.0.0.1:9101:9101"
    networks:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: teacher-assistant-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  caddy:
    image: caddy:2-alpine
    container_name: teacher-assistant-caddy
    restart: unless-stopped
    profiles:
      - proxy
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      MINIO_DOMAIN: ${MINIO_DOMAIN}
      MINIO_CONSOLE_DOMAIN: ${MINIO_CONSOLE_DOMAIN}
      PGADMIN_DOMAIN: ${PGADMIN_DOMAIN}
      TLS_EMAIL: ${TLS_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  caddy_config:
  caddy_data:
  minio_data:
  pgadmin_data:
  postgres_data:
  redis_data:
